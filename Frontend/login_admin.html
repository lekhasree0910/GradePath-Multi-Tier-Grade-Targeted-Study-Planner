<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GradePath</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
        window.API_BASE_URL = window.API_BASE_URL || 'https://ai.vishnulabs.dev/api';
    </script>
    <script src="script.js?v=20260722-1" defer></script>
</head>
<body id="page-login-admin">
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header>
        <a href="index.html" class="logo">
            <i class="fas fa-graduation-cap"></i> GradePath
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="courses.html">Courses</a>
            <a href="customize.html">Customize</a>
            <a href="vault.html">History</a>
        </nav>
        <div id="header-actions" class="header-actions"></div>
    </header>

    <main class="auth-wrapper">
        <div class="login-split-container">
            <!-- Left Side: Dark Blue graphic card containing desk illustration (Image 2 style) -->
            <div class="login-split-left">
                <img src="assets/desk_vector.png?v=4" alt="Admin Dashboard Illustration" style="border-radius:12px;">
                <h3>GradePath Console</h3>
                <p>Monitor curriculum complexity & analytics</p>
            </div>
            
            <!-- Right Side: Neumorphic form fields (Image 2 style) -->
            <div class="login-split-right">
                <div class="auth-header">
                    <h2>Admin <span class="gradient-text">Portal</span></h2>
                    <p>Authorized access to curriculum & platforms analytics</p>
                </div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Admin Email</label>
                        <input type="email" id="login-email" class="neumorphic-input" placeholder="admin@gradepath.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" class="neumorphic-input" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="neumorphic-btn" style="margin-top: 1rem;">
                        Secure Login <i class="fas fa-shield-alt"></i>
                    </button>
                </form>
                
                <div class="auth-switch">
                    Need admin rights? Contact platform administrator.
                    <br><br>
                    Are you a Student? <a href="login_student.html">Go to Student Portal</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
